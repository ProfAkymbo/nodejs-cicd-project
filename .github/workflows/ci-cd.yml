name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. Build and Test the Application
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Run tests
        working-directory: ./app
        run: npm test

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest

  # 2. Provision Infrastructure via Terraform
  infrastructure:
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      ec2_ip: ${{ steps.terraform.outputs.EC2_IP }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: ./terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_key_name: ${{ secrets.TF_VAR_KEY_NAME }}

      - name: Export EC2 IP
        id: terraform
        working-directory: ./terraform
        run: echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  # 3. Deploy to the EC2 Instance
  deploy:
    runs-on: ubuntu-latest
    needs: infrastructure
    steps:
      - name: Wait for EC2 SSH access
        run: |
          for i in {1..60}; do
            if nc -z ${{ needs.infrastructure.outputs.ec2_ip }} 22; then
              echo "EC2 SSH port is open"
              exit 0
            fi
            echo "Waiting for EC2 SSH... (attempt $i/60)"
            sleep 5
          done
          echo "EC2 failed to become ready"
          exit 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.infrastructure.outputs.ec2_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ensure Docker is running
            sudo yum install -y docker || true
            sudo systemctl start docker || true
            sudo usermod -aG docker ec2-user || true

            # Pull and rotate the container
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
            sudo docker stop app || true
            sudo docker rm app || true
            sudo docker run -d -p 3000:3000 --name app ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
